[CustomCheats]
; Master switch.  Set to false to disable all cheat application without
; removing the plugin from the luma/plugins folder.
enabled = true

; Write a log file to sdmc:/luma/plugins/CustomCheats/cheats.log
logging = true

; Extra verbose logging (useful when a cheat isn't behaving as expected)
debug = false

; How often (in milliseconds) enabled "continuous" cheats are re-applied.
; Lower = more responsive / sturdier against the game overwriting values,
; but uses slightly more CPU. 33ms (~30Hz) is a good default.
poll_interval_ms = 33

; EXPERIMENTAL. Use the Citro2D (GPU-accelerated) menu renderer instead of
; the default framebuffer renderer, for anti-aliased shapes and smoother
; text. Off by default: a 3GX plugin runs inside the game's own process
; and shares its GPU command queue, so GPU-accelerated drawing from the
; plugin thread is inherently riskier than plain framebuffer pixel writes.
; The plugin will only actually use this backend if your Luma3DS build's
; plugin SDK confirms it's safe to do so; otherwise it silently falls
; back to the framebuffer renderer regardless of this setting. See
; README.md "Graphical Interface" section before enabling.
gui_backend_citro2d = false
