[CustomCheats]
; Master switch.  Set to false to disable all cheat application without
; removing the plugin from the luma/plugins folder.
enabled = true

; Write a log file to sdmc:/luma/plugins/CustomCheats/cheats.log
logging = true

; Extra verbose logging (useful when a cheat isn't behaving as expected)
debug = false

; How often (in milliseconds) enabled "continuous" cheats are re-applied.
; Lower = more responsive / sturdier against the game overwriting values,
; but uses slightly more CPU. 33ms (~30Hz) is a good default.
poll_interval_ms = 33
